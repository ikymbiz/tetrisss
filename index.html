<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Tetrisss</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --board-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #38bdf8;
            --glass-border: rgba(255, 255, 255, 0.08);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overscroll-behavior: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            touch-action: none;
            position: fixed;
            inset: 0;
        }

        .app-container {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding-top: max(10px, var(--safe-top));
            padding-bottom: max(14px, var(--safe-bottom));
        }

        .header {
            flex: 0 0 auto;
            width: 100%;
            padding: 6px 16px 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 12px;
        }

        .title {
            font-size: 1.9rem;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            line-height: 1;
            letter-spacing: -1px;
        }

        .stats {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 10px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            min-width: 44px;
        }

        .stat-box span {
            font-size: 0.55rem;
            color: var(--text-sub);
            font-weight: 600;
            letter-spacing: 1.2px;
        }

        .stat-box div {
            font-size: 1.05rem;
            font-weight: 800;
            line-height: 1.1;
            color: #fff;
        }

        #next-canvas {
            width: 38px;
            height: 38px;
            margin-top: 2px;
        }

        .board-area {
            flex: 1 1 auto;
            min-height: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px 14px;
        }

        .board-container {
            position: relative;
            aspect-ratio: 1 / 2;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            background-color: var(--board-bg);
            border-radius: 14px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px var(--glass-border);
            overflow: hidden;
            cursor: pointer;
        }

        @supports (aspect-ratio: 1/2) {
            .board-container { width: auto; }
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.88);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.3s ease;
            padding: 24px 18px;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #overlay-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #fff;
            margin: 0 0 18px 0;
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.1;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .gesture-guide {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px 16px;
            width: 100%;
            max-width: 260px;
        }

        .gesture-row {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.78rem;
            color: var(--text-main);
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .gesture-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            background: rgba(56, 189, 248, 0.15);
            border-radius: 8px;
            color: var(--accent);
            flex-shrink: 0;
        }

        .gesture-row span {
            color: var(--text-sub);
            font-weight: 500;
            font-size: 0.72rem;
        }

        .btn-primary {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 14px 44px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.3);
            font-family: inherit;
            letter-spacing: 2px;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn-primary:active {
            transform: translateY(3px);
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }

        .hint-bar {
            flex: 0 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            padding: 8px 14px 0;
            font-size: 0.62rem;
            color: var(--text-sub);
            letter-spacing: 0.8px;
            opacity: 0.65;
            flex-wrap: wrap;
        }

        .hint-bar span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .hint-bar b {
            color: var(--accent);
            font-weight: 700;
        }

        @media (max-height: 700px) {
            .title { font-size: 1.6rem; }
            .header { padding-top: 2px; padding-bottom: 6px; }
            .stat-box { padding: 4px 8px; }
            .stat-box div { font-size: 0.95rem; }
            #next-canvas { width: 32px; height: 32px; }
            .hint-bar { font-size: 0.58rem; gap: 10px; }
        }

        @media (max-height: 580px) {
            .hint-bar { display: none; }
            .gesture-guide { padding: 10px 12px; gap: 8px; }
            .gesture-row { font-size: 0.72rem; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <div class="title">Tetrisss</div>
        <div class="stats">
            <div class="stat-box">
                <span>SCORE</span>
                <div id="score-val">0</div>
            </div>
            <div class="stat-box">
                <span>LEVEL</span>
                <div id="level-val">1</div>
            </div>
            <div class="stat-box">
                <span>NEXT</span>
                <canvas id="next-canvas"></canvas>
            </div>
        </div>
    </header>

    <div class="board-area">
        <main class="board-container" id="board-container">
            <canvas id="game-canvas"></canvas>
            <div id="overlay" class="overlay">
                <div id="overlay-title">Tetrisss</div>
                <div class="gesture-guide">
                    <div class="gesture-row">
                        <div class="gesture-icon">👆</div>
                        <div>タップ<br><span>回転</span></div>
                    </div>
                    <div class="gesture-row">
                        <div class="gesture-icon">↔</div>
                        <div>横スワイプ<br><span>左右に移動</span></div>
                    </div>
                    <div class="gesture-row">
                        <div class="gesture-icon">↓</div>
                        <div>ゆっくり下スワイプ<br><span>1マス落とす</span></div>
                    </div>
                    <div class="gesture-row">
                        <div class="gesture-icon">⇊</div>
                        <div>素早く下スワイプ<br><span>一気に下まで落とす</span></div>
                    </div>
                </div>
                <button id="btn-start" class="btn-primary">START</button>
            </div>
        </main>
    </div>

    <div class="hint-bar">
        <span>👆 <b>タップ</b> 回転</span>
        <span>↔ <b>左右</b> 移動</span>
        <span>↓ <b>下</b> 1マス</span>
        <span>⇊ <b>素早く下</b> 一気に</span>
    </div>
</div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const nextCanvas = document.getElementById('next-canvas');
    const nextCtx = nextCanvas.getContext('2d');

    const ROWS = 20;
    const COLS = 10;
    const BLOCK_SIZE = 30;
    canvas.width = COLS * BLOCK_SIZE;
    canvas.height = ROWS * BLOCK_SIZE;
    ctx.scale(BLOCK_SIZE, BLOCK_SIZE);

    const NEXT_SIZE = 24;
    nextCanvas.width = 4 * NEXT_SIZE;
    nextCanvas.height = 4 * NEXT_SIZE;
    nextCtx.scale(NEXT_SIZE, NEXT_SIZE);

    const colors = [
        null,
        '#a855f7', '#eab308', '#f97316', '#3b82f6',
        '#06b6d4', '#22c55e', '#ef4444'
    ];

    const pieces = ['T','O','L','J','I','S','Z'];

    function createPiece(type) {
        switch (type) {
            case 'T': return { type: 'T', matrix: [[0,1,0],[1,1,1],[0,0,0]] };
            case 'O': return { type: 'O', matrix: [[2,2],[2,2]] };
            case 'L': return { type: 'L', matrix: [[0,0,3],[3,3,3],[0,0,0]] };
            case 'J': return { type: 'J', matrix: [[4,0,0],[4,4,4],[0,0,0]] };
            case 'I': return { type: 'I', matrix: [[0,0,0,0],[5,5,5,5],[0,0,0,0],[0,0,0,0]] };
            case 'S': return { type: 'S', matrix: [[0,6,6],[6,6,0],[0,0,0]] };
            case 'Z': return { type: 'Z', matrix: [[7,7,0],[0,7,7],[0,0,0]] };
        }
    }

    const kickTable = {
        normal: {
            '0->1': [[0,0], [-1,0], [-1,-1], [0, 2], [-1, 2]],
            '1->0': [[0,0], [ 1,0], [ 1, 1], [0,-2], [ 1,-2]],
            '1->2': [[0,0], [ 1,0], [ 1, 1], [0,-2], [ 1,-2]],
            '2->1': [[0,0], [-1,0], [-1,-1], [0, 2], [-1, 2]],
            '2->3': [[0,0], [ 1,0], [ 1,-1], [0, 2], [ 1, 2]],
            '3->2': [[0,0], [-1,0], [-1, 1], [0,-2], [-1,-2]],
            '3->0': [[0,0], [-1,0], [-1, 1], [0,-2], [-1,-2]],
            '0->3': [[0,0], [ 1,0], [ 1,-1], [0, 2], [ 1, 2]]
        },
        I: {
            '0->1': [[0,0], [-2,0], [ 1,0], [-2, 1], [ 1,-2]],
            '1->0': [[0,0], [ 2,0], [-1,0], [ 2,-1], [-1, 2]],
            '1->2': [[0,0], [-1,0], [ 2,0], [-1,-2], [ 2, 1]],
            '2->1': [[0,0], [ 1,0], [-2,0], [ 1, 2], [-2,-1]],
            '2->3': [[0,0], [ 2,0], [-1,0], [ 2,-1], [-1, 2]],
            '3->2': [[0,0], [-2,0], [ 1,0], [-2, 1], [ 1,-2]],
            '3->0': [[0,0], [ 1,0], [-2,0], [ 1, 2], [-2,-1]],
            '0->3': [[0,0], [-1,0], [ 2,0], [-1,-2], [ 2, 1]]
        }
    };

    let arena = createMatrix(COLS, ROWS);
    const player = { pos: {x: 0, y: 0}, matrix: null, type: '', rotIndex: 0 };
    let nextPieceObj = null;
    
    let dropCounter = 0;
    let dropInterval = 3000;
    let lastTime = 0;
    
    let score = 0;
    let level = 1;
    let linesClearedTotal = 0;
    
    let isGameOver = false;
    let isPaused = true;
    let animationId = null;
    let pieceId = 0; // 駒が新しく出現するたびに+1。ジェスチャーが同じ駒に対するか判定するのに使う

    function haptic(ms = 8) {
        if (navigator.vibrate) {
            try { navigator.vibrate(ms); } catch(e) {}
        }
    }

    function createMatrix(w, h) {
        const matrix = [];
        while (h--) matrix.push(new Array(w).fill(0));
        return matrix;
    }

    function collide(arena, player) {
        const m = player.matrix;
        const o = player.pos;
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
            });
        });
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
        }
        dropCounter = 0;
    }

    function playerHardDrop() {
        while (!collide(arena, player)) {
            player.pos.y++;
        }
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
        updateScore();
        dropCounter = 0;
        haptic(20);
    }

    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) {
            player.pos.x -= dir;
            return false;
        }
        return true;
    }

    function playerRotate(dir) {
        if (player.type === 'O') return; 

        const nextRotIndex = (player.rotIndex + dir + 4) % 4;
        const stateStr = `${player.rotIndex}->${nextRotIndex}`;
        
        const nextMatrix = player.matrix.map(row => [...row]);
        for (let y = 0; y < nextMatrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [nextMatrix[x][y], nextMatrix[y][x]] = [nextMatrix[y][x], nextMatrix[x][y]];
            }
        }
        if (dir > 0) nextMatrix.forEach(row => row.reverse());
        else nextMatrix.reverse();

        const table = (player.type === 'I') ? kickTable.I : kickTable.normal;
        const tests = table[stateStr];

        for (let i = 0; i < tests.length; i++) {
            const offset = tests[i];
            const origX = player.pos.x;
            const origY = player.pos.y;
            
            player.pos.x += offset[0];
            player.pos.y += offset[1];
            
            const origMatrix = player.matrix;
            player.matrix = nextMatrix;
            
            if (!collide(arena, player)) {
                player.rotIndex = nextRotIndex;
                return;
            }
            
            player.pos.x = origX;
            player.pos.y = origY;
            player.matrix = origMatrix;
        }
    }

    function playerReset() {
        if (!nextPieceObj) {
            nextPieceObj = createPiece(pieces[Math.random() * pieces.length | 0]);
        }
        player.type = nextPieceObj.type;
        player.matrix = nextPieceObj.matrix;
        player.rotIndex = 0;
        
        nextPieceObj = createPiece(pieces[Math.random() * pieces.length | 0]);
        
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);

        if (collide(arena, player)) gameOver();
        drawNext();

        // 新しい駒は必ず通常の重力でスタート (前の駒に対するスワイプの効果を引き継がない)
        pieceId++;
        dropCounter = 0;
    }

    function arenaSweep() {
        let rowCount = 1;
        let linesCleared = 0;
        outer: for (let y = arena.length - 1; y >= 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) continue outer;
            }
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;
            score += rowCount * 100;
            rowCount *= 2;
            linesCleared++;
        }

        if (linesCleared > 0) {
            haptic(30);
            linesClearedTotal += linesCleared;
            const newLevel = Math.floor(linesClearedTotal / 10) + 1;
            if (newLevel > level) {
                level = newLevel;
                dropInterval = Math.max(400, 3000 - (level - 1) * 150);
            }
        }
    }

    function updateScore() {
        document.getElementById('score-val').innerText = score;
        document.getElementById('level-val').innerText = level;
    }

    function gameOver() {
        isGameOver = true;
        isPaused = true;
        const overlay = document.getElementById('overlay');
        const title = document.getElementById('overlay-title');
        overlay.classList.remove('hidden');
        title.innerHTML = 'GAME OVER';
        title.style.color = '#ef4444';
        document.getElementById('btn-start').innerText = 'RETRY';
        cancelAnimationFrame(animationId);
        haptic(60);
    }

    function resetGame() {
        arena.forEach(row => row.fill(0));
        score = 0;
        level = 1;
        linesClearedTotal = 0;
        dropInterval = 3000;
        isGameOver = false;
        isPaused = false;
        const title = document.getElementById('overlay-title');
        title.style.color = '#fff';
        title.innerHTML = 'Tetrisss';
        updateScore();
        playerReset();
        lastTime = performance.now();
        update();
    }

    function drawBlock(context, x, y, color) {
        const m = 0.04;
        const s = 1 - m * 2;
        const r = 0.15;

        context.fillStyle = color;
        if (context.roundRect) {
            context.beginPath();
            context.roundRect(x + m, y + m, s, s, r);
            context.fill();
        } else {
            context.fillRect(x + m, y + m, s, s);
        }

        context.fillStyle = 'rgba(255, 255, 255, 0.2)';
        if (context.roundRect) {
            context.beginPath();
            context.roundRect(x + m, y + m, s, s * 0.2, [r, r, 0, 0]);
            context.fill();
        } else {
            context.fillRect(x + m, y + m, s, s * 0.2);
        }
    }

    function drawMatrix(matrix, offset, context) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    drawBlock(context, x + offset.x, y + offset.y, colors[value]);
                }
            });
        });
    }

    function drawGhost() {
        const ghost = { matrix: player.matrix, pos: { x: player.pos.x, y: player.pos.y } };
        while (!collide(arena, ghost)) ghost.pos.y++;
        ghost.pos.y--;
        
        ctx.globalAlpha = 0.2;
        drawMatrix(ghost.matrix, ghost.pos, ctx);
        ctx.globalAlpha = 1.0;
    }

    function draw() {
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = 'rgba(255,255,255,0.02)';
        ctx.lineWidth = 0.05;
        ctx.beginPath();
        for(let i=1; i<COLS; i++) { ctx.moveTo(i, 0); ctx.lineTo(i, ROWS); }
        for(let i=1; i<ROWS; i++) { ctx.moveTo(0, i); ctx.lineTo(COLS, i); }
        ctx.stroke();

        drawMatrix(arena, {x: 0, y: 0}, ctx);
        drawGhost();
        drawMatrix(player.matrix, player.pos, ctx);
    }

    function drawNext() {
        nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
        if(!nextPieceObj) return;
        
        const m = nextPieceObj.matrix;
        const offset = {
            x: (4 - m[0].length) / 2,
            y: (4 - m.length) / 2
        };
        drawMatrix(m, offset, nextCtx);
    }

    function update(time = 0) {
        if (isPaused) return;
        const deltaTime = time - lastTime;
        lastTime = time;

        dropCounter += deltaTime;
        if (dropCounter > dropInterval) {
            playerDrop();
        }

        draw();
        animationId = requestAnimationFrame(update);
    }

    // --- 盤面ジェスチャー操作 (スワイプ＆タップのみ) ---
    const boardEl = document.getElementById('board-container');

    let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
    let lastMoveX = 0, lastMoveY = 0;
    let dragAccumX = 0;
    let touchActive = false;
    let movedHorizontally = false;
    let gestureAxis = null;

    // ブロックが切り替わった直後はしばらく新しいタッチを無視する
    // (指のバウンスや誤タッチが新しいブロックに作用するのを防ぐ)
    let inputBlockedUntil = 0;
    const PIECE_CHANGE_COOLDOWN_MS = 350;

    function getCellPx() {
        const r = boardEl.getBoundingClientRect();
        return r.width / COLS;
    }

    boardEl.addEventListener('pointerdown', (e) => {
        if (isPaused || isGameOver) return;
        if (e.target.closest('button')) return;
        // ブロック切り替え直後のクールダウン中はタッチを無視
        if (Date.now() < inputBlockedUntil) {
            e.preventDefault();
            return;
        }

        e.preventDefault();
        touchStartX = lastMoveX = e.clientX;
        touchStartY = lastMoveY = e.clientY;
        touchStartTime = Date.now();
        movedHorizontally = false;
        dragAccumX = 0;
        gestureAxis = null;
        touchActive = true;
        try { boardEl.setPointerCapture(e.pointerId); } catch(_) {}
    });

    boardEl.addEventListener('pointermove', (e) => {
        if (!touchActive) return;
        if (isPaused || isGameOver) return;
        e.preventDefault();

        const cellPx = getCellPx();
        lastMoveX = e.clientX;
        lastMoveY = e.clientY;

        const totalDx = e.clientX - touchStartX;
        const totalDy = e.clientY - touchStartY;
        const absDx = Math.abs(totalDx);
        const absDy = Math.abs(totalDy);

        // 方向ロック判定：12px 以上動いた時点で、優勢な軸にロックする
        // 縦が優勢なら横移動を一切発火しない (= 下スワイプ中に横ズレしない)
        if (gestureAxis === null) {
            if (absDx > 12 || absDy > 12) {
                if (absDy > absDx) {
                    gestureAxis = 'v';
                } else {
                    gestureAxis = 'h';
                }
            }
        }

        // 横方向ロックのときだけ、横移動を発火
        if (gestureAxis === 'h') {
            // 累積を「タッチ開始からの総ズレ」基準にして、横方向のドラッグで1セルずつ移動
            // セル幅の0.85倍以上動いたら1マス、戻ればキャンセル
            const targetMoves = Math.trunc(totalDx / (cellPx * 0.85));
            const currentMoves = movedHorizontally ? Math.trunc(dragAccumX / (cellPx * 0.85)) : 0;
            const delta = targetMoves - currentMoves;
            for (let i = 0; i < Math.abs(delta); i++) {
                const dir = delta > 0 ? 1 : -1;
                playerMove(dir);
            }
            if (delta !== 0) {
                dragAccumX = totalDx;
                movedHorizontally = true;
            }
        }
        // 縦方向ロックのときは何もしない (release時にハードドロップ判定)
    });

    boardEl.addEventListener('pointerup', (e) => {
        if (!touchActive) return;
        touchActive = false;
        try { boardEl.releasePointerCapture(e.pointerId); } catch(_) {}

        if (isPaused || isGameOver) return;

        const dx = e.clientX - touchStartX;
        const dy = e.clientY - touchStartY;
        const dt = Date.now() - touchStartTime;
        const cellPx = getCellPx();

        // タップ (ほぼ動かない短いタッチ) → 回転
        if (gestureAxis === null && Math.abs(dx) < 10 && Math.abs(dy) < 10 && dt < 350) {
            haptic(8);
            playerRotate(1);
            return;
        }

        // 縦方向ロックされていて、最低限の距離が下方向にある → 落下処理
        // 横方向ロックされていたら何もしない (横移動だけで終了)
        if (gestureAxis === 'v' && dy > 0) {
            const minVertical = Math.max(20, cellPx * 0.6);
            if (dy <= minVertical) return;

            // 平均速度 (px/ms) と移動距離で「素早い下スワイプ」を判定
            const velocity = dy / Math.max(1, dt);
            const isQuickSwipe = velocity > 0.8 || dy > cellPx * 4;

            if (isQuickSwipe) {
                // 素早い下スワイプ → 現在のブロックを一気にハードドロップ
                playerHardDrop();
                // 新しいブロックに次のスワイプが波及しないよう、しばらくタッチをブロック
                inputBlockedUntil = Date.now() + PIECE_CHANGE_COOLDOWN_MS;
            } else {
                // ゆっくりした下スワイプ → 1マスだけ落下
                const beforeId = pieceId;
                playerDrop();
                if (pieceId === beforeId) {
                    // 駒がロックされていない (=同じ駒のまま) → 自動落下を一時停止
                    dropCounter = -dropInterval;
                } else {
                    // 駒がロックされて新しい駒が出現した → 新しい駒へ作用が波及しないようクールダウン
                    inputBlockedUntil = Date.now() + PIECE_CHANGE_COOLDOWN_MS;
                }
            }
        }
    });

    boardEl.addEventListener('pointercancel', () => {
        touchActive = false;
    });

    // PCキーボード (補助)
    document.addEventListener('keydown', event => {
        if (isPaused) return;
        switch (event.keyCode) {
            case 37: playerMove(-1); break;
            case 39: playerMove(1); break;
            case 40: playerDrop(); break;
            case 38: case 32: playerHardDrop(); break;
            case 88: case 13: playerRotate(1); break;
        }
    });

    document.getElementById('btn-start').addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        document.getElementById('overlay').classList.add('hidden');
        resetGame();
    });

    playerReset();
    draw();
</script>
</body>
</html>
